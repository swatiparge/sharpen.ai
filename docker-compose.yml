version: '3.9'

services:

  # ── Frontend (Next.js standalone) ───────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3000}
    ports:
      - '3001:3001'
    env_file:
      - ./frontend/.env.local
    depends_on:
      - backend
    restart: unless-stopped

  # ── Backend (Node.js / TypeScript) ──────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - '3000:3000'
    env_file:
      - ./backend/.env
    depends_on:
      - redis
    restart: unless-stopped

  # ── AI Service (Python FastAPI) ──────────────────────────────────
  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    ports:
      - '8000:8000'
    env_file:
      - ./ai-service/.env
    volumes:
      # Persist cache and uploads across restarts
      - ai_cache:/app/cache
      - ai_uploads:/app/uploads
    restart: unless-stopped

  # ── Redis (BullMQ queue) ─────────────────────────────────────────
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  redis_data:
  ai_cache:
  ai_uploads:
